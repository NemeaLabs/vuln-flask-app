name: Triage — Trivy

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: triage-trivy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run Trivy (SARIF output)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Arbiter (Trivy SARIF)
        id: arbiter
        uses: NemeaLabs/arbiter@v1
        continue-on-error: true
        env:
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          TRIAGE_PROVIDER:      ${{ secrets.TRIAGE_PROVIDER }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:      ${{ secrets.ANTHROPIC_MODEL }}
          AZURE_AI_ENDPOINT:    ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY:     ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_MODEL:       ${{ secrets.AZURE_AI_MODEL }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sarif-file: trivy.sarif
          baseline: ${{ github.event.pull_request.base.sha }}
          fail-on: high-tp
          out: trivy-report

      - name: Ensure report exists
        run: |
          [ -f trivy-report.md ] || printf '<!-- ai-triage-trivy -->\n# Trivy Triage\n\nNo report produced. Check logs.\n' > trivy-report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-triage-trivy
          path: trivy-report.md

      - name: Enforce gate
        if: steps.arbiter.outcome == 'failure'
        run: exit 1
