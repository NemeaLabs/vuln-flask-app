name: Triage — Semgrep

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: triage-semgrep-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run Arbiter (Semgrep)
        id: arbiter
        uses: NemeaLabs/arbiter@v1
        continue-on-error: true
        env:
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          TRIAGE_PROVIDER:      ${{ secrets.TRIAGE_PROVIDER }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:      ${{ secrets.ANTHROPIC_MODEL }}
          AZURE_AI_ENDPOINT:    ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY:     ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_MODEL:       ${{ secrets.AZURE_AI_MODEL }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          scanners: semgrep
          baseline: ${{ github.event.pull_request.base.sha }}
          fail-on: high-tp
          out: semgrep-report

      - name: Ensure report exists
        run: |
          [ -f semgrep-report.md ] || printf '<!-- ai-triage-semgrep -->\n# Semgrep Triage\n\nNo report produced. Check logs.\n' > semgrep-report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-triage-semgrep
          path: semgrep-report.md

      - name: Enforce gate
        if: steps.arbiter.outcome == 'failure'
        run: exit 1
