name: AI Vulnerability Triage

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: ai-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run Arbiter
        id: arbiter
        uses: NemeaLabs/arbiter@v1
        continue-on-error: true
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          baseline: ${{ github.event.pull_request.base.sha }}
          scanners: semgrep,codeql
          github-ref: refs/pull/${{ github.event.pull_request.number }}/head
          fail-on: high-tp
          out: report

      - name: Ensure report exists
        run: |
          [ -f report.md ] || printf '<!-- ai-triage-report -->\n# AI Triage Report\n\nThe job did not produce a report. Check logs.\n' > report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with: { header: ai-triage, path: report.md }

      - name: Enforce gate
        if: steps.arbiter.outcome == 'failure'
        run: exit 1
