name: AI Vulnerability Triage — Trivy

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: ai-triage-trivy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: run Trivy and produce a SARIF file ────────────────────────
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          exit-code: '0'   # don't fail here; Arbiter gate handles it

      # ── Step 2: triage the SARIF output with Arbiter ──────────────────────
      - name: Run Arbiter
        id: arbiter
        uses: NemeaLabs/arbiter@v1
        continue-on-error: true
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          TRIAGE_PROVIDER:   ${{ secrets.TRIAGE_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY:  ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_MODEL:    ${{ secrets.AZURE_AI_MODEL }}
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sarif-file: trivy.sarif
          baseline: ${{ github.event.pull_request.base.sha }}
          fail-on: high-tp
          out: report

      - name: Ensure report exists
        run: |
          [ -f report.md ] || printf '<!-- ai-triage-report -->\n# AI Triage Report (Trivy)\n\nThe job did not produce a report. Check logs.\n' > report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with: { header: ai-triage-trivy, path: report.md }

      - name: Enforce gate
        if: steps.arbiter.outcome == 'failure'
        run: exit 1
