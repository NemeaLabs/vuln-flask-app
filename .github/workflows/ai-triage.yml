name: AI Vulnerability Triage

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: ai-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run Arbiter
        id: arbiter
        uses: NemeaLabs/arbiter@v1
        continue-on-error: true
        env:
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          TRIAGE_PROVIDER:      ${{ secrets.TRIAGE_PROVIDER }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:      ${{ secrets.ANTHROPIC_MODEL }}
          AZURE_AI_ENDPOINT:    ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY:     ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_MODEL:       ${{ secrets.AZURE_AI_MODEL }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          baseline: ${{ github.event.pull_request.base.sha }}
          scanners: semgrep,codeql
          github-ref: refs/pull/${{ github.event.pull_request.number }}/head
          fail-on: high-tp
          out: report

      - name: Ensure report exists
        run: |
          [ -f report.md ] || printf '<!-- ai-triage-report -->\n# AI Triage Report\n\nThe job did not produce a report. Check logs.\n' > report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with: { header: ai-triage, path: report.md }

      - name: Enforce gate
        if: steps.arbiter.outcome == 'failure'
        run: exit 1
