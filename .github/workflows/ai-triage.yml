name: AI Vulnerability Triage

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: ai-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Fetch triage CLI
        run: git clone --depth 1 https://github.com/claude-access/vuln-triage /tmp/triage

      - name: Install deps
        run: |
          pip install -r /tmp/triage/triage-cli/requirements.txt
          pip install semgrep

      - name: Debug providers.py
        run: |
          echo "=== providers.py get_provider ==="
          grep -n "azure.openai\|choice\|def get_provider\|TRIAGE_PROVIDER" /tmp/triage/triage-cli/providers.py
          echo "=== triage.py get_provider call ==="
          grep -n "get_provider\|TRIAGE_PROVIDER" /tmp/triage/triage-cli/triage.py

      - name: Run triage
        # The CLI picks a provider from TRIAGE_PROVIDER (defaults to
        # anthropic). Only the vars for the chosen provider need to be
        # set in repo secrets; the rest can be empty.
        env:
          TRIAGE_PROVIDER:    azure-openai
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL }}
          AZURE_AI_ENDPOINT:  ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY:   ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_MODEL:     ${{ secrets.AZURE_AI_MODEL }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
        run: |
          set +e
          python /tmp/triage/triage-cli/triage.py . \
            --baseline "${{ github.event.pull_request.base.sha }}" \
            --out report --fail-on high-tp
          echo "exit_code=$?" >> "$GITHUB_ENV"
          set -e

      - name: Ensure report exists
        run: |
          [ -f report.md ] || printf '<!-- ai-triage-report -->\n# AI Triage Report\n\nThe job did not produce a report. Check logs.\n' > report.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with: { header: ai-triage, path: report.md }

      - if: env.exit_code != '0'
        run: exit 1
